name: Deploy to GitHub Pages and Schedule Ingestion

on:
  push:
    branches:
      - main
  schedule:
    # Verificación de Servicios (Luz, Agua, Gas): Diariamente a las 06:00, 12:00, 18:00 y 21:00 Arg (UTC-3).
    # UTC: 03:00 Arg es 06:00 UTC, etc.
    # 06:00 Arg -> 09:00 UTC
    # 12:00 Arg -> 15:00 UTC
    # 18:00 Arg -> 21:00 UTC
    # 21:00 Arg -> 00:00 UTC (del día siguiente)
    # Cron en UTC: 0 0,9,15,21 * * *
    - cron: '0 0,9,15,21 * * *'
    # Verificación de Expensas: Primeros 5 días del mes a las 18:00 Arg (21:00 UTC).
    # Cron en UTC: 0 21 1-5 * *
    - cron: '0 21 1-5 * *'

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Clonar historial para commits

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber urllib3

      - name: Determine Update Mode
        id: mode-selector
        run: |
          # Si se activa por push o por el cron mensual de expensas (21:00 UTC en días 1-5)
          if [ "${{ github.event_name }}" = "push" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "$(date +%d)" -le 5 ] && [ "$(date +%H)" -eq 21 ]; }; then
            echo "MODE=--all" >> $GITHUB_ENV
            echo "Determined Update Mode: --all (Full update + PDF search)"
          else
            echo "MODE=--services-only" >> $GITHUB_ENV
            echo "Determined Update Mode: --services-only (Utility monitoring only)"
          fi

      - name: Run Update Script
        run: |
          python cron_update.py ${{ env.MODE }}

      - name: Commit Database and Status Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add gastos.json prorrateo.json servicios_status.json liquidaciones/
          # Hacer commit solo si hay cambios en staging para evitar fallar el job
          if ! git diff --cached --quiet; then
            git commit -m "chore(auto-update): sync database and status data [skip ci]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes in utility status or PDF database."
          fi

      # Deploy: Vercel auto-despliega desde la rama main al detectar el push.
      # Configuración del dominio en: vercel.com → sarmiento-151 → Settings → Domains
      # Dominio personalizado: alexismartyniuk.com.ar con prefijo de ruta /sarmiento-151
